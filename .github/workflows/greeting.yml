name: First-Pipeline
on: [push]
job:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK
      - uses: actions/setup-java@v3
        with: 
          java-version: '21'

      - name: Build with maven
        run: mvn clean package
      - name: Build Docker Image
        run: docker build -t myapp:${{github.sha}} .
